<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/loginstyle.css">

	<title>Login</title>
</head>
<body>
		<div class="contain">
		<div class="view">
			<div class="view2">
				<div class="column">
					<img
						src="/resource/TU logo.png" 
						class="image"
					/>
					<span class="text" >
						มหาวิทยาลัยธรรมศาสตร์<br/>Thammasat University
					</span>
					<div class="box">
					</div>
          <form onsubmit="login(event)">
					<span class="text2" >
						อีเมลมหาวิทยาลัย
					</span>
					<div class="row-view">
						<img
							src="/resource/user.svg" 
							class="image2"
						/>
						<input
							type="username"
              id="username"
							placeholder="username"
							class="input"
						/>
					</div>
					<span class="text3" >
						รหัสผ่าน
					</span>
					<div class="row-view2">
						<img
							src="/resource/lock.svg" 
							class="image3"
						/>
						<input
              id="password"
							type="password"
							placeholder="กรอกรหัสผ่าน"
              onchange="validateField(this)"
							class="input"
						/>
					</div>
					<button class="button">
						<span class="text4" >
							เข้าสู่ระบบ
						</span>
					</button>
          </form>
          <script src="/loginscrip.js"></script>
				</div>
			</div>
		</div>
	</div>
  
</body>
</html>
