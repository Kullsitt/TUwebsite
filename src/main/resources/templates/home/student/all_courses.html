<!DOCTYPE html>
<html lang="th" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการทั้งหมด - Thammasat</title>
    <link rel="stylesheet" th:href="@{/css/homestyle.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-orange-bar"></div>
    <div class="container">
        <header class="main-header">
            <div class="logo-section">
                <img th:src="@{/images/TU logo.png}" alt="Thammasat Logo" class="logo-img">
                <div class="logo-text">
                    <span class="uni-name-th">มหาวิทยาลัยธรรมศาสตร์</span><br>
                    <span class="uni-name-en">Thammasat University</span>
                </div>
            </div>
            <div class="user-section">
                <div class="notification">
                    <i class="fa-regular fa-bell"></i><span class="badge">2</span>
                </div>
                <div class="user-profile">
                    <div class="avatar-placeholder"><i class="fa-solid fa-user"></i></div>
                    <span class="user-name" th:text="${user != null ? user.displaynameTh : 'ชื่อนักศึกษา'}">ชื่อนักศึกษาตัวอย่าง</span>
                </div>
            </div>
        </header>

        <div class="search-container">
            <div class="search-box">
                <i class="fa-solid fa-bars menu-icon"></i>
                <input type="text" id="searchInput" placeholder="ค้นหารายวิชา">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
            </div>
        </div>

        <div class="main-content">
            <aside class="sidebar">
                <ul class="menu-list">
                    <li th:onclick="|window.location.href='@{/home/student}'|"><i class="fa-solid fa-graduation-cap"></i> รายวิชาของฉัน</li>
                    <li class="active" th:onclick="|window.location.href='@{/all-courses}'|"><i class="fa-solid fa-graduation-cap"></i> รายการทั้งหมด</li>
                </ul>
            </aside>

            <section class="content-area">
                <div class="filter-section">
                    <select class="term-select">
                        <option value="1">ภาคการศึกษาที่ 1/2568</option>
                    </select>
                </div>
                
                <div class="course-grid">
                    <div th:if="${#lists.isEmpty(allCourses)}" style="grid-column: 1/-1; text-align: center; padding: 50px;">
                         <i class="fa-solid fa-box-open" style="font-size: 50px; color: #ccc;"></i>
                         <p style="margin-top: 15px; color: #666;">ยังไม่มีรายวิชาที่เปิดสอนในขณะนี้</p>
                    </div>

                    <div class="course-card" th:each="course, stat : ${allCourses}">
                        <div class="card-banner" 
                             th:classappend="${stat.index % 4 == 0 ? 'bg-blue' : (stat.index % 4 == 1 ? 'bg-green' : (stat.index % 4 == 2 ? 'bg-yellow' : 'bg-darkblue'))}">
                            <span class="course-code" th:text="${course.courseId}">รหัสวิชา</span>
                            <h3 class="course-title" th:text="${course.courseName}">ชื่อวิชา</h3>
							
                        </div>
                        
                        <div class="card-details">
                            <p th:text="'อาจารย์: ' + ${course.teacherName != null ? course.teacherName : 'รอระบุอาจารย์'}">ชื่ออาจารย์</p>
                            <p class="capacity" th:text="'ลงทะเบียน: ' + ${course.capacity} + ' คน'">ลงทะเบียน: 0 คน</p>
                            
                            <button th:unless="${enrolledCourseIds != null and #lists.contains(enrolledCourseIds, course.courseId)}" 
                                    class="btn-register" 
                                    th:onclick="|window.location.href='@{/assignment/submit(id=${course.courseId})}'|">
                                ลงทะเบียนเรียน
                            </button>
                            
                            <button th:if="${enrolledCourseIds != null and #lists.contains(enrolledCourseIds, course.courseId)}" 
                                    class="btn-register" style="background-color: #9e9e9e; cursor: not-allowed;" disabled>
                                ลงทะเบียนแล้ว
                            </button>
                        </div>
                    </div>
					
						<div id="noSearchResults" style="display: none; grid-column: 1/-1; text-align: center; padding: 50px; color: #666;">
					                        <i class="fa-solid fa-magnifying-glass" style="font-size: 48px; margin-bottom: 15px; color: #ccc;"></i>
					                        <p>ไม่พบรายวิชาที่คุณค้นหา</p>
					    </div>
                </div>

                <div class="pagination" th:if="${not #lists.isEmpty(allCourses)}">
                    <span class="page-info">หน้า 1 จาก 1</span>
                    <button class="page-btn active">1</button>
                </div>
            </section>
        </div>
    </div>
	
	 <script>
		const searchInput = document.getElementById('searchInput');
		const courseCards = document.querySelectorAll('.course-card');
		const noSearchResults = document.getElementById('noSearchResults'); // 1. ดึงกล่องข้อความมาเตรียมไว้

		if (searchInput) {
		    searchInput.addEventListener('input', function(e) {
		        const keyword = e.target.value.toLowerCase().trim();
		        let visibleCount = 0; // 2. สร้างตัวแปรมาคอยนับการ์ดที่หาเจอ
		        
		        courseCards.forEach(card => {
		            const code = card.querySelector('.course-code').innerText.toLowerCase();
		            const title = card.querySelector('.course-title').innerText.toLowerCase();
		            
		            if (code.includes(keyword) || title.includes(keyword)) {
		                card.style.display = 'block';
		                visibleCount++; // 3. ถ้าหาเจอ ให้นับเพิ่มทีละ 1
		            } else {
		                card.style.display = 'none';
		            }
		        });

		        // 4. เช็คผลลัพธ์: ถ้ามีการ์ดในระบบ แต่ดันหาไม่เจอเลยสักใบ (visibleCount == 0)
		        if (noSearchResults && courseCards.length > 0) {
		            if (visibleCount === 0) {
		                noSearchResults.style.display = 'block'; // โชว์ข้อความ "ไม่พบรายวิชา"
		            } else {
		                noSearchResults.style.display = 'none';  // ซ่อนข้อความทิ้งไป
		            }
		        }
		    });
		}
		    </script>
	
</body>
</html>
