<!DOCTYPE html>
<html lang="th" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการทั้งหมด (หน้า 2) - Thammasat</title>
    <link rel="stylesheet" th:href="@{/css/homestyle.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-orange-bar"></div>
    <div class="container">
        <header class="main-header">
            <div class="logo-section">
                <img th:src="@{/images/TU logo.png}" alt="Thammasat Logo" class="logo-img">
                <div class="logo-text"><span class="uni-name-th">มหาวิทยาลัยธรรมศาสตร์</span><br><span class="uni-name-en">Thammasat University</span></div>
            </div>
            <div class="user-section">
                <div class="notification">
                    <i class="fa-regular fa-bell"></i><span class="badge">2</span>
                    </div>
                <div class="user-profile">
                    <div class="avatar-placeholder"><i class="fa-solid fa-user"></i></div>
                    <span class="user-name" th:text="${user != null ? user.displaynameTh : 'ชื่อนักศึกษา'}">ชื่อนักศึกษาตัวอย่าง</span>
                </div>
            </div>
        </header>

        <div class="search-container">
            <div class="search-box"><i class="fa-solid fa-bars menu-icon"></i><input type="text" placeholder="ค้นหารายวิชา"><i class="fa-solid fa-magnifying-glass search-icon"></i></div>
        </div>

        <div class="main-content">
            <aside class="sidebar">
                <ul class="menu-list">
                    <li th:onclick="|window.location.href='@{/home/student}'|"><i class="fa-solid fa-graduation-cap"></i> รายวิชาของฉัน</li>
                    <li class="active" th:onclick="|window.location.href='@{/all-courses}'|"><i class="fa-solid fa-graduation-cap"></i> รายการทั้งหมด</li>
                </ul>
            </aside>

            <section class="content-area">
                <div class="filter-section">
                    <select class="term-select">
                        <option value="1">ภาคการศึกษาที่ 1/2568</option>
                        <option value="2">ภาคการศึกษาที่ 2/2568</option>
                        <option value="s">ภาคการศึกษาที่ s/2568</option>
                    </select>
                </div>
                
                <div class="course-grid">
                    
                    <div class="course-card">
                        <div class="card-banner bg-blue"><span class="course-code">SC211</span><h3 class="course-title">ฟิสิกส์ทั่วไป</h3></div>
                        <div class="card-details">
                            <p>อาจารย์: สมชาย</p><p class="capacity">ลงทะเบียน: 30 คน</p>
                            
                            <button th:unless="${enrolledCourseIds != null and #lists.contains(enrolledCourseIds, 'SC211')}" 
                                    class="btn-register" th:onclick="|window.location.href='@{/assignment/submit(id=SC211)}'|">
                                ลงทะเบียนเรียน
                            </button>
                            
                            <button th:if="${enrolledCourseIds != null and #lists.contains(enrolledCourseIds, 'SC211')}" 
                                    class="btn-register" style="background-color: #9e9e9e; cursor: not-allowed;" disabled>
                                ลงทะเบียนแล้ว
                            </button>
                        </div>
                    </div>

                    <div class="course-card">
                        <div class="card-banner bg-green"><span class="course-code">EC210</span><h3 class="course-title">เศรษฐศาสตร์มหภาค</h3></div>
                        <div class="card-details">
                            <p>อาจารย์: สมหญิง</p><p class="capacity">ลงทะเบียน: 40 คน</p>
                            
                            <button th:unless="${enrolledCourseIds != null and #lists.contains(enrolledCourseIds, 'EC210')}" 
                                    class="btn-register" th:onclick="|window.location.href='@{/assignment/submit(id=EC210)}'|">
                                ลงทะเบียนเรียน
                            </button>
                            
                            <button th:if="${enrolledCourseIds != null and #lists.contains(enrolledCourseIds, 'EC210')}" 
                                    class="btn-register" style="background-color: #9e9e9e; cursor: not-allowed;" disabled>
                                ลงทะเบียนแล้ว
                            </button>
                        </div>
                    </div>
                </div>

				<div class="pagination">
				    <span class="page-info">หน้า 2 จาก 2</span>
				    <button class="page-btn" th:onclick="|window.location.href='@{/all-courses}'|">1</button>
				    <button class="page-btn active" th:onclick="|window.location.href='@{/all-courses-p2}'|">2</button>
				    <button class="page-btn" disabled>&gt;</button>
				</div>
            </section>
        </div>
    </div>
</body>
</html>
