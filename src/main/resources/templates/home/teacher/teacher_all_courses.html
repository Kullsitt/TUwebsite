<!DOCTYPE html>
<html lang="th" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการทั้งหมด - Thammasat</title>
    <link rel="stylesheet" th:href="@{/css/home_teacher_style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-orange-bar"></div>
    <div class="container">
        <header class="main-header">
            <div class="logo-section">
                <img th:src="@{/images/v39_436.png}" alt="TU Logo" class="logo-img">
                <div class="logo-text">
                    <span class="uni-name-th">มหาวิทยาลัยธรรมศาสตร์</span><br>
                    <span class="uni-name-en">Thammasat University</span>
                </div>
            </div>
            <div class="user-section">
                <div class="notification">
                    <i class="fa-regular fa-bell"></i><span class="badge">2</span>
                </div>
                <div class="user-profile">
                    <div class="avatar-placeholder"><i class="fa-solid fa-user"></i></div>
                    <span class="user-name" th:text="${user.displaynameTh}">ชื่ออาจารย์</span>
                </div>
            </div>
        </header>

        <div class="search-container">
            <div class="search-box">
                <i class="fa-solid fa-bars menu-icon"></i>
                <input type="text" placeholder="ค้นหารายวิชา">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
            </div>
            <button class="btn-add-course" onclick="openModal()"><i class="fa-solid fa-plus"></i> เพิ่มรายวิชา</button>
        </div>

        <div class="main-content">
           <aside class="sidebar">
                <ul class="menu-list">
                    <li th:onclick="|window.location.href='@{/dashboard/teacher}'|">
                        <i class="fa-solid fa-graduation-cap"></i> รายวิชาของฉัน
                    </li>
                    <li class="active" th:onclick="|window.location.href='@{/dashboard/teacher/all-courses}'|">
                        <i class="fa-solid fa-graduation-cap"></i> รายการทั้งหมด
                    </li>
                </ul>
            </aside>

            <section class="content-area">
                <div class="filter-section">
                    <select class="term-select">
                        <option value="1">ภาคการศึกษา: 1/2568 </option>
                    </select>
                </div>
                
				<div class="course-grid">
                    <div th:if="${#lists.isEmpty(allCourses)}" style="grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5;">
                         <p>ไม่มีรายวิชาในระบบ</p>
                    </div>

                    <div class="course-card" th:each="course, stat : ${allCourses}" 
                         th:onclick="|window.location.href='@{/dashboard/teacher/course(id=${course.courseId})}'|" style="cursor: pointer;">
				        <div class="card-banner" 
                             th:classappend="${stat.index % 4 == 0 ? 'bg-blue' : (stat.index % 4 == 1 ? 'bg-green' : (stat.index % 4 == 2 ? 'bg-yellow' : 'bg-darkblue'))}">
				            <span class="course-code" th:text="${course.courseId}">รหัสวิชา</span>
				            <h3 class="course-title" th:text="${course.courseName}">ชื่อวิชา</h3>
				        </div>
				        <div class="card-details">
				            <p>อาจารย์: <span th:text="${course.teacherName}">ชื่ออาจารย์</span></p>
				            <p class="section-info">ความจุ : <span th:text="${course.capacity}"></span> คน</p>
				        </div>
				    </div>
				</div>
				<div class="pagination" th:if="${not #lists.isEmpty(allCourses)}">
				                   <span class="page-info">หน้า 1 จาก 1</span>
				                   <button class="page-btn active">1</button>
				               </div>
				
            </section>
        </div>
    </div>

    <div class="modal-overlay" id="addCourseModal" style="display: none;">
        <div class="modal-box">
            <div class="modal-header">
                <div><i class="fa-regular fa-square-plus"></i> เพิ่มรายวิชาใหม่</div>
                <i class="fa-solid fa-xmark" onclick="closeModal()" style="cursor: pointer;"></i>
            </div>
            <form th:action="@{/teacher/course/save}" method="post">
                <div class="modal-body">
                    <div class="form-group">
                        <label>ชื่อรายวิชา</label>
                        <input type="text" name="courseName" placeholder="ex.การเขียนโปรแกรมเบื้องต้น" required>
                    </div>
                    <div class="form-group">
                        <label>รหัสวิชา</label>
                        <input type="text" name="courseId" placeholder="ex.CS101" required>
                    </div>
                    <div class="form-group">
                        <label>ชื่อผู้สอน</label>
                        <input type="text" name="teacherName" th:value="${user.displaynameTh}" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>จำนวนที่รับ</label>
                            <input type="number" name="capacity" value="30" required>
                        </div>
                       
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
                    <button type="submit" class="btn-submit">สร้างเนื้อหา</button>
                </div>
            </form>
        </div>
    </div>
	
	</div> 
	
	

    <script>
        function openModal() { document.getElementById('addCourseModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('addCourseModal').style.display = 'none'; }
        window.onclick = function(event) {
            var modal = document.getElementById('addCourseModal');
            if (event.target == modal) { modal.style.display = "none"; }
        }
    </script>
</body>
</html>
